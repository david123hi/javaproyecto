<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SportClub | Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header class="dashboard-header">
        <div>
            <h2>SportClub</h2>
            <p id="panelName">Panel</p>
        </div>

        <button id="logoutButton" class="logout-button">Cerrar Sesión</button>
    </header>

    <main class="dashboard-container">

        <section class="dashboard-welcome">
            <span id="roleBadge" class="dashboard-role">Rol</span>
            <h1 id="welcomeUser">Bienvenido</h1>
            <p id="roleDescription"></p>
        </section>

        <section id="dashboardContent" class="dashboard-grid">
        </section>

    </main>

    <script src="js/dashboard.js"></script>
</body>
</html>
