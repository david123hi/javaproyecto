<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SportClub | Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-page">

    <main class="login-wrapper">
        <section class="login-card">

            <div class="login-header">
                <h1>Inicia Sesión</h1>
                <p>Accede con tu cuenta de SportClub</p>
            </div>

            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label for="email">Correo Electrónico</label>
                    <input 
                        type="email" 
                        id="email" 
                        placeholder="ejemplo@sportclub.cl"
                        autocomplete="username"
                    >
                </div>

                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input 
                        type="password" 
                        id="password" 
                        placeholder="Ingresa tu contraseña"
                        autocomplete="current-password"
                    >
                </div>

                <p id="errorMessage" class="error-message"></p>

                <button type="submit" class="btn-login">Ingresar</button>
            </form>

            <a href="index.html" class="btn-back">Volver al inicio</a>

            <div class="test-users">
                <h4>Usuarios de prueba</h4>
                <p><strong>Usuario:</strong> user1@sportclub.cl / 1234</p>
                <p><strong>Coach:</strong> coach1@sportclub.cl / 1234</p>
                <p><strong>Admin:</strong> admin1@sportclub.cl / 1234</p>
            </div>

        </section>
    </main>

    <script src="js/login.js"></script>
</body>
</html>
