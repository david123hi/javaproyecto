<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SportClub</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body class="auth-body">

    <div class="auth-wrapper">
        <nav class="auth-nav">
            <a href="./index.html">Inicio</a>
            <a href="./login.html" class="active">Iniciar sesión</a>
            <a href="./register.html">Registrarse</a>
        </nav>

        <div class="auth-card">
            <div class="logo-box">
                <h1>SportClub</h1>
                <p>Ingresa con tu cuenta para continuar</p>
            </div>

            <div id="loginMessage" class="message"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Correo electrónico</label>
                    <input class="form-control" type="email" id="email" placeholder="Ej: admin1@demo.cl">
                    <small id="emailError" class="error-text"></small>
                </div>

                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input class="form-control" type="password" id="password" placeholder="Ingresa tu contraseña">
                    <small id="passwordError" class="error-text"></small>
                </div>

                <button class="btn btn-primary btn-full" type="submit">Ingresar</button>
            </form>

            <div class="auth-link">
                ¿No tienes cuenta? <a href="./register.html">Regístrate aquí</a>
            </div>
        </div>
    </div>

    <script src="./js/common.js"></script>
    <script src="./js/login.js"></script>
</body>
</html>
