<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - SportClub</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body class="auth-body">

    <div class="auth-wrapper">
        <nav class="auth-nav">
            <a href="./index.html">Inicio</a>
            <a href="./login.html">Iniciar sesión</a>
            <a href="./register.html" class="active">Registrarse</a>
        </nav>

        <div class="auth-card">
            <div class="logo-box">
                <h1>SportClub</h1>
                <p>Crea tu cuenta como usuario</p>
            </div>

            <div id="registerMessage" class="message"></div>

            <form id="registerForm">
                <div class="form-group">
                    <label for="fullName">Nombre completo</label>
                    <input class="form-control" type="text" id="fullName" placeholder="Ej: Juan Pérez">
                    <small id="fullNameError" class="error-text"></small>
                </div>

                <div class="form-group">
                    <label for="email">Correo electrónico</label>
                    <input class="form-control" type="email" id="email" placeholder="Ej: juan@demo.cl">
                    <small id="emailError" class="error-text"></small>
                </div>

                <div class="form-group">
                    <label for="birthDate">Fecha de nacimiento</label>
                    <input class="form-control" type="date" id="birthDate">
                    <small id="birthDateError" class="error-text"></small>
                </div>

                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input class="form-control" type="password" id="password" placeholder="Mínimo 8 caracteres">
                    <small id="passwordError" class="error-text"></small>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirmar contraseña</label>
                    <input class="form-control" type="password" id="confirmPassword" placeholder="Repite tu contraseña">
                    <small id="confirmPasswordError" class="error-text"></small>
                </div>

                <button class="btn btn-success btn-full" type="submit">Crear cuenta</button>
            </form>

            <div class="auth-link">
                ¿Ya tienes cuenta? <a href="./login.html">Inicia sesión</a>
            </div>
        </div>
    </div>

    <script src="./js/common.js"></script>
    <script src="./js/register.js"></script>
</body>
</html>
