<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SportClub | Registro</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-page">

    <main class="auth-wrapper">
        <section class="auth-card">

            <div class="auth-header">
                <h1>Crear Cuenta</h1>
                <p>Regístrate como usuario de SportClub</p>
            </div>

            <form id="registerForm" class="auth-form">
                <div class="form-group">
                    <label for="fullName">Nombre completo</label>
                    <input 
                        type="text" 
                        id="fullName" 
                        placeholder="Ej: David Araya"
                    >
                </div>

                <div class="form-group">
                    <label for="email">Correo electrónico</label>
                    <input 
                        type="email" 
                        id="email" 
                        placeholder="ejemplo@demo.cl"
                    >
                </div>

                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input 
                        type="password" 
                        id="password" 
                        placeholder="Mínimo 8 caracteres"
                    >
                </div>

                <div class="form-group">
                    <label for="repeatPassword">Repetir contraseña</label>
                    <input 
                        type="password" 
                        id="repeatPassword" 
                        placeholder="Repite tu contraseña"
                    >
                </div>

                <div class="form-group">
                    <label for="birthDate">Fecha de nacimiento opcional</label>
                    <input 
                        type="date" 
                        id="birthDate"
                    >
                </div>

                <p id="errorMessage" class="error-message"></p>
                <p id="successMessage" class="success-message"></p>

                <button type="submit" class="btn-login">Registrarse</button>
            </form>

            <a href="login.html" class="btn-back">Ya tengo cuenta</a>
            <a href="index.html" class="btn-back">Volver al inicio</a>

        </section>
    </main>

    <script src="js/register.js"></script>
</body>
</html>
